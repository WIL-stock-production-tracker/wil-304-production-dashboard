// Notifications via Telegram Bot (free, no SIM needed)
// or WhatsApp via Twilio / CallMeBot
var NOTIF_SETTINGS={
  telegramBotToken:'',
  completionChatIds:'', // comma separated telegram chat IDs
  breakdownChatIds:'',
  wapiKey:'',          // CallMeBot WhatsApp API key
  wapiNumbers:'',      // comma separated WhatsApp numbers
  method:'telegram'    // 'telegram' or 'whatsapp'
};

async function sendNotification(msg,type){
  // Load settings
  var s=NOTIF_SETTINGS;
  try{var res=await GH.load('notification_settings');if(res&&res.telegramBotToken!==undefined)s=res;}catch(e){}
  var chatIds=type==='breakdown'?s.breakdownChatIds:s.completionChatIds;
  if(!chatIds)return;
  var ids=chatIds.split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(s.method==='telegram'&&s.telegramBotToken){
    ids.forEach(function(chatId){
      fetch('https://api.telegram.org/bot'+s.telegramBotToken+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text:msg,parse_mode:'HTML'})}).catch(function(){});
    });
  } else if(s.method==='whatsapp'&&s.wapiKey){
    var nums=s.wapiNumbers.split(',').map(function(x){return x.trim();}).filter(Boolean);
    nums.forEach(function(num){
      var url='https://api.callmebot.com/whatsapp.php?phone='+num+'&text='+encodeURIComponent(msg)+'&apikey='+s.wapiKey;
      fetch(url).catch(function(){});
    });
  }
}

function findEmp(id){return EMP_DETAILS.find(function(e){return e.id===id;});}
function empLogin(id,pw){var e=findEmp(id);return(e&&pw===id)?e:null;}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){var d=new Date();return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}
function uid(){return Date.now()+Math.random().toString(36).slice(2,6);}
function getAssignedOperators(supId){
  var sup=findEmp(supId);if(!sup)return[];
  var supCodes=sup.codes;
  return EMP_DETAILS.filter(function(e){
    if(!['Operator','Fitter','Setter'].includes(e.cat))return false;
    if(e.cat==='Fitter'||e.cat==='Setter')return true;
    return e.codes.some(function(c){return supCodes.includes(c)||supCodes.includes('A');});
  });
}

function buildOpts(items,valFn,lblFn,selectedFn,firstOpt){
  var html=firstOpt?'<option value="">'+firstOpt+'</option>':'';
  items.forEach(function(item){
    var v=valFn(item),l=lblFn(item),sel=selectedFn(item)?' selected':'';
    html+='<option value="'+v+'"'+sel+'>'+l+'</option>';
  });
  return html;
}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(function(kv){
    var k=kv[0],v=kv[1];
    if(k==='style')Object.assign(e.style,v);
    else if(k==='className')e.className=v;
    else if(k.startsWith('on'))e[k.toLowerCase()]=v;
    else e.setAttribute(k,v);
  });
  if(children)children.forEach(function(c){if(c!=null){if(typeof c==='string')e.appendChild(document.createTextNode(c));else e.appendChild(c);}});
  return e;
}
function div(a,c){return el('div',a,c);}
function btn(label,cls,onClick,style){var b=el('button',{className:'btn '+cls,style:style||{},onclick:onClick},[label]);return b;}
function fld(label,input){var w=div({className:'fld'});w.innerHTML='<label class="lbl">'+label+'</label>';w.appendChild(input);return w;}
function card(style){return div({className:'card',style:style||{}});}
function sHdr(text,color){var d=div({className:'sec-hdr',style:{color:color||'#1e40af'}});d.textContent=text;return d;}
function pill(text,cls){return el('span',{className:'pill '+cls},[text]);}
function backBtn(label,onClick){return el('button',{className:'btn-back',onclick:onClick},['← '+(label||'Back')]);}

// RENDER
// ════════════════════════════════════════════════
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  // Notify toast
  if(APP.notify){
    var toast=div({style:{position:'fixed',top:'12px',left:'50%',transform:'translateX(-50%)',background:'#047857',color:'#fff',padding:'10px 24px',borderRadius:'8px',fontWeight:'700',fontSize:'13px',zIndex:'9999',boxShadow:'0 4px 16px rgba(0,0,0,.25)',whiteSpace:'nowrap'}});
    toast.textContent=APP.notify;
    app.appendChild(toast);
  }
  // Modal
  if(APP.modal)app.appendChild(buildModal());
  // Screen
  var s=APP.screen;
  var content;
  if(s==='landing')content=screenLanding();
  else if(s==='ghsetup')content=screenGHSetup();
  else if(s==='roleselect')content=screenRoleSelect();
  else if(s==='sup_login')content=screenLogin('Line Supervisor','#1e40af','supervisor');
  else if(s==='op_login')content=screenLogin('Operator / Fitter / Setter','#047857','operator');
  else if(s==='qual_login')content=screenLogin('Quality Inspector','#7c3aed','quality');
  else if(s==='supervisor')content=screenSupervisor();
  else if(s==='operator')content=screenOperator();
  else if(s==='quality')content=screenQuality();
  else if(s==='dashboards')content=screenDashboards();
  else if(s==='notif_settings')content=screenNotifSettings();
  else content=screenLanding();
  app.appendChild(content);
  afterRender();
}

function buildModal(){

  var box=div({className:'modal-box'});
  overlay.appendChild(box);

  if(APP.modal==='dash_auth'){
    box.innerHTML='<div style="font-family:monospace;font-size:13px;font-weight:800;color:#1e3a5f;margin-bottom:20px;letter-spacing:2px">DASHBOARD LOGIN</div>';
    var uf=div({className:'fld'});uf.innerHTML='<label class="lbl">Username</label>';var ui=el('input',{type:'text',placeholder:'WIL'});uf.appendChild(ui);box.appendChild(uf);
    var pf=div({className:'fld'});pf.innerHTML='<label class="lbl">Password</label>';var pi=el('input',{type:'password',placeholder:'Wil@1234'});pf.appendChild(pi);box.appendChild(pf);
    var eb=div({style:{color:'#dc2626',fontSize:'12px',marginBottom:'10px',display:'none'}});eb.id='dash-err';box.appendChild(eb);
    var loginB=btn('VIEW DASHBOARDS','btn-purple',function(){
      if(ui.value==='WIL'&&pi.value==='Wil@1234'){APP.modal=null;go('dashboards');}
      else{document.getElementById('dash-err').textContent='Invalid credentials.';document.getElementById('dash-err').style.display='block';}
    },{width:'100%',padding:'12px',marginBottom:'8px'});
    var cancelB=btn('Cancel','btn-gray',function(){APP.modal=null;render();},{width:'100%',padding:'10px',background:'transparent',color:'#64748b',border:'1px solid #e2e8f0'});
    box.appendChild(loginB);box.appendChild(cancelB);
  }
  else if(APP.modal==='view_log'&&APP.viewLog){
    var log=APP.viewLog;
    var op=findEmp(log.empId);
    box.innerHTML='<div style="font-family:monospace;font-size:13px;font-weight:800;color:#1e3a5f;margin-bottom:16px;letter-spacing:2px">OPERATOR LOG ENTRY (VIEW ONLY)</div>';
    var rows=[
      ['Date',log.date],['Operator',op?op.name:log.empId],['Machine',MACHINE_SHORT[log.machine]||log.machine],
      ['Product',log.product],['Setting',log.setting],['Job S.No',log.jobSno],
      ['Shift',log.shift],['Shift Slot',log.shiftSlot],['Remarks',log.remarks||'—']
    ];
    var tbl=el('table',{style:{marginBottom:'14px'}});
    rows.forEach(function(row){
      var tr=el('tr',{});
      tr.innerHTML='<td style="font-size:11px;color:#64748b;font-weight:700;padding:6px 8px;text-transform:uppercase;width:40%">'+row[0]+'</td><td style="font-size:13px;font-weight:600;padding:6px 8px">'+row[1]+'</td>';
      tbl.appendChild(tr);
    });

      var lhdr=div({style:{fontFamily:'monospace',fontSize:'11px',fontWeight:'800',color:'#b91c1c',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'8px',borderBottom:'1.5px solid #fca5a5',paddingBottom:'6px'}});

          row2.innerHTML='<span style="color:#374151">'+cat+'</span><span style="fontFamily:monospace;fontWeight:800;color:#dc2626">'+v+' mins</span>';
          box.appendChild(row2);
        }
      });
    }
    var closeB=btn('Close','btn-gray',function(){APP.modal=null;APP.viewLog=null;render();},{width:'100%',padding:'10px',marginTop:'14px'});
    box.appendChild(closeB);
  }
  return overlay;
}

function screenLogin(roleLabel,color,nextScreen){
  var d=div({style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8fafc',padding:'16px'}});
  var box=div({style:{background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:'14px',padding:'36px 28px',width:'100%',maxWidth:'380px',boxShadow:'0 8px 32px rgba(0,0,0,.08)'}});
  var empId='',pw='',err='';
  function doLogin(){
    var emp=empLogin(empId.trim(),pw.trim());
    if(!emp){err='Invalid ID or Password. (Password = Employee ID)';render2();return;}
    if(nextScreen==='supervisor'&&emp.cat!=='Line Supervisor'&&emp.cat!=='Shift Supervisor'){err='Access denied: Line Supervisors only.';render2();return;}
    if(nextScreen==='operator'&&!['Operator','Fitter','Setter'].includes(emp.cat)){err='Access denied: Operator / Fitter / Setter only.';render2();return;}
    APP.currentEmp=emp;APP.supTab='starttime';go(nextScreen);
  }
  function render2(){
    box.innerHTML='<div style="text-align:center;margin-bottom:24px"><div style="background:'+color+';color:#fff;font-family:monospace;font-weight:800;font-size:14px;padding:7px 16px;border-radius:6px;letter-spacing:2px;display:inline-block;margin-bottom:8px">'+roleLabel.toUpperCase()+'</div><div style="color:#64748b;font-size:12px">Login &middot; WIL Plant W304</div><div style="color:#94a3b8;font-size:11px;margin-top:3px">Password = Your Employee ID</div></div>';
    var f1=div({className:'fld'});f1.innerHTML='<label class="lbl">Employee ID</label>';var i1=el('input',{type:'text',value:empId,placeholder:'e.g. 10104020'});i1.oninput=function(e){empId=e.target.value;};i1.onkeydown=function(e){if(e.key==='Enter')doLogin();};f1.appendChild(i1);box.appendChild(f1);
    var f2=div({className:'fld'});f2.innerHTML='<label class="lbl">Password</label>';var i2=el('input',{type:'password',value:pw,placeholder:'Your Employee ID'});i2.oninput=function(e){pw=e.target.value;};i2.onkeydown=function(e){if(e.key==='Enter')doLogin();};f2.appendChild(i2);box.appendChild(f2);
    if(err){var eb=div({style:{background:'#fff1f2',border:'1px solid #fca5a5',borderRadius:'7px',padding:'9px 12px',marginBottom:'12px',color:'#dc2626',fontSize:'12px'}});eb.textContent=err;box.appendChild(eb);}
    box.appendChild(btn('SIGN IN  →','btn-blue',doLogin,{width:'100%',padding:'13px',fontSize:'14px',marginBottom:'10px',background:color}));
    box.appendChild(backBtn('Select Role',function(){go('roleselect');}));
  }
  render2();d.appendChild(box);return d;
}

function buildOEEDash(){
  var d=div({});d.appendChild(sHdr('📊 OEE DASHBOARD','#ea580c'));
  var approvedLogs=STATE.operatorLogs.filter(function(l){return l.approvalStatus==='APPROVED';});
  var machines=['ALL'].concat([...new Set(approvedLogs.map(function(l){return MACHINE_SHORT[l.machine]||l.machine;}).filter(Boolean))]);
  var filter={period:'month',month:today().slice(0,7),year:today().slice(0,4),machine:'ALL'};
  var SCHED=1440,BD_CATS=['MACHINE BREAK DOWN','PREVENTIVE MAINTENANCE/MACHINE CLEANING'],NM_CATS=['NO MATERIAL'];
  function calcOEE(logs){
    if(!logs.length)return{oee:0,avail:0,perf:0,qual:0,good:0,rejected:0};
    var md=new Set(logs.map(function(l){return l.date+'__'+l.machine;})).size;
    var ts=md*SCHED;
    var bdL=logs.reduce(function(a,l){var s=0;BD_CATS.forEach(function(c){s+=(l.losses?l.losses[c]||0:0);});return a+s;},0);
    var avail=ts>0?Math.min(100,Math.max(0,(ts-bdL)/ts*100)):0;
    var tact=logs.reduce(function(a,l){return a+(l.actCT||60);},0);
    var exl=logs.reduce(function(a,l){var s=0;BD_CATS.concat(NM_CATS).forEach(function(c){s+=(l.losses?l.losses[c]||0:0);});return a+s;},0);
    var run=Math.max(1,tact-exl);var pl=logs.length*60;
    var perf=Math.min(100,Math.max(0,pl/run*100));
    var relQ=STATE.qualityLogs.filter(function(q){
      var dOk=filter.period==='month'?q.date&&q.date.slice(0,7)===filter.month:q.date&&q.date.slice(0,4)===filter.year;
      var mOk=filter.machine==='ALL'||new Set(logs.map(function(l){return l.machine;})).has(q.machine);
      return dOk&&mOk;
    });
    var good=relQ.reduce(function(a,q){return a+(q.goodQty||0);},0);var tot=relQ.reduce(function(a,q){return a+(q.inspectedQty||0);},0);
    var qual=tot>0?Math.min(100,good/tot*100):95;
    return{oee:+((avail/100)*(perf/100)*(qual/100)*100).toFixed(1),avail:+avail.toFixed(1),perf:+perf.toFixed(1),qual:+qual.toFixed(1),good:good,rejected:tot-good};
  }
  var kRow=div({style:{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'14px'}});
  var fCard=card({padding:'12px',marginBottom:'14px'});
  var mCard=card({padding:'14px',marginBottom:'14px'});
  var tCard=card({padding:'14px'});
  var barInst=null,lineInst=null;
  function kpiC(v,g,w){return v>=(g||85)?'#047857':v>=(w||70)?'#d97706':'#dc2626';}
  function renderOEE(){
    var fLogs=approvedLogs.filter(function(l){if(!l.date)return false;var dOk=filter.period==='month'?l.date.slice(0,7)===filter.month:l.date.slice(0,4)===filter.year;return dOk&&(filter.machine==='ALL'||(MACHINE_SHORT[l.machine]||l.machine)===filter.machine);});
    var ov=calcOEE(fLogs);
    fCard.innerHTML='';
    var sf=div({style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}});
    ['month','year'].forEach(function(p){var b=btn(p==='month'?'MONTH':'YEAR','',function(){filter.period=p;renderOEE();},{padding:'5px 12px',fontSize:'11px',background:filter.period===p?'#ea580c':'#f1f5f9',color:filter.period===p?'#fff':'#1e293b',border:'none',borderRadius:'6px',fontWeight:'700'});sf.appendChild(b);});
    if(filter.period==='month'){var mi=el('input',{type:'month',value:filter.month,style:{width:'auto'}});mi.oninput=function(e){filter.month=e.target.value;renderOEE();};sf.appendChild(mi);}
    if(filter.period==='year'){var yi=el('select',{style:{width:'auto'}});yi.innerHTML=buildOpts(['2024','2025','2026','2027'],function(y){return y;},function(y){return y;},function(y){return y===filter.year;});yi.onchange=function(e){filter.year=e.target.value;renderOEE();};sf.appendChild(yi);}
    var ms=el('select',{style:{width:'auto'}});ms.innerHTML=buildOpts(machines,function(m){return m;},function(m){return m;},function(m){return m===filter.machine;});ms.onchange=function(e){filter.machine=e.target.value;renderOEE();};sf.appendChild(ms);
    fCard.appendChild(sf);
    kRow.innerHTML='';
    [{l:'OEE',v:ov.oee+'%',c:kpiC(ov.oee)},{l:'AVAILABILITY',v:ov.avail+'%',c:kpiC(ov.avail)},{l:'PERFORMANCE',v:ov.perf+'%',c:kpiC(ov.perf)},{l:'QUALITY',v:ov.qual+'%',c:kpiC(ov.qual,98,95)},{l:'GOOD',v:ov.good,c:'#1e40af'},{l:'REJECTED',v:ov.rejected,c:'#dc2626'}].forEach(function(k){var kc=card({padding:'10px 12px',flex:'1',minWidth:'80px',textAlign:'center'});kc.innerHTML='<div class="kpi-lbl">'+k.l+'</div><div class="kpi-val" style="color:'+k.c+';font-size:18px">'+k.v+'</div>';kRow.appendChild(kc);});
    var mData=machines.filter(function(m){return m!=='ALL';}).map(function(m){var ml=fLogs.filter(function(l){return (MACHINE_SHORT[l.machine]||l.machine)===m;});return Object.assign({machine:m,entries:ml.length},calcOEE(ml));}).filter(function(m){return m.entries>0;});
    mCard.innerHTML='<div style="font-family:monospace;font-size:11px;font-weight:800;color:#ea580c;letter-spacing:2px;margin-bottom:10px">MACHINE-WISE OEE</div>';
    if(mData.length){
      var tbl=el('table',{style:{marginBottom:'14px'}});tbl.innerHTML='<thead><tr><th>Machine</th><th>OEE%</th><th>Avail%</th><th>Perf%</th><th>Quality%</th></tr></thead>';
      var tb=el('tbody',{});mData.forEach(function(m,i){var r=el('tr',{style:{background:i%2?'#f9fafb':'#fff'}});r.innerHTML='<td style="font-family:monospace;font-weight:800">'+m.machine+'</td><td style="font-family:monospace;color:'+kpiC(m.oee)+';font-weight:800">'+m.oee+'%</td><td style="font-family:monospace;color:'+kpiC(m.avail)+'">'+m.avail+'%</td><td style="font-family:monospace;color:'+kpiC(m.perf)+'">'+m.perf+'%</td><td style="font-family:monospace;color:'+kpiC(m.qual,98,95)+'">'+m.qual+'%</td>';tb.appendChild(r);});tbl.appendChild(tb);mCard.appendChild(tbl);
      mCard.appendChild(el('div',{style:{height:'220px'}},[el('canvas',{id:'oeeBar'})]));
      setTimeout(function(){var c=document.getElementById('oeeBar');if(!c)return;if(barInst)barInst.destroy();barInst=new Chart(c,{type:'bar',data:{labels:mData.map(function(m){return m.machine;}),datasets:[{label:'OEE%',data:mData.map(function(m){return m.oee;}),backgroundColor:'rgba(234,88,12,.75)'},{label:'Avail%',data:mData.map(function(m){return m.avail;}),backgroundColor:'rgba(30,64,175,.7)'},{label:'Perf%',data:mData.map(function(m){return m.perf;}),backgroundColor:'rgba(4,120,87,.7)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{y:{min:0,max:100}}}});},60);
    } else {mCard.innerHTML+='<div style="color:#94a3b8;text-align:center;padding:16px;font-size:12px">No data</div>';}
    var dw=Array.from({length:31},function(_,i){var day=i+1;var dl=fLogs.filter(function(l){return l.date&&parseInt(l.date.slice(8,10))===day;});return Object.assign({day:day},calcOEE(dl));}).filter(function(d){return d.oee>0||d.avail>0;});
    tCard.innerHTML='<div style="font-family:monospace;font-size:11px;font-weight:800;color:#ea580c;letter-spacing:2px;margin-bottom:10px">DAY-WISE OEE TREND</div><div style="height:240px"><canvas id="oeeLineChart"></canvas></div>';
    setTimeout(function(){var c=document.getElementById('oeeLineChart');if(!c)return;if(lineInst)lineInst.destroy();if(!dw.length)return;lineInst=new Chart(c,{type:'line',data:{labels:dw.map(function(d){return 'D'+d.day;}),datasets:[{label:'OEE%',data:dw.map(function(d){return d.oee;}),borderColor:'#ea580c',tension:.3,fill:false,pointRadius:3},{label:'Avail%',data:dw.map(function(d){return d.avail;}),borderColor:'#1e40af',tension:.3,fill:false,pointRadius:3},{label:'Perf%',data:dw.map(function(d){return d.perf;}),borderColor:'#047857',tension:.3,fill:false,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{y:{min:0,max:100}}}});},80);
  }
  renderOEE();d.appendChild(fCard);d.appendChild(kRow);d.appendChild(mCard);d.appendChild(tCard);return d;
}

function buildCTDash(){
  var d=div({});d.appendChild(sHdr('⏱ CYCLE TIME DASHBOARD','#047857'));
  var approvedLogs=STATE.operatorLogs.filter(function(l){return l.approvalStatus==='APPROVED';});
  var machines=['ALL'].concat([...new Set(approvedLogs.map(function(l){return MACHINE_SHORT[l.machine]||l.machine;}).filter(Boolean))]);
  var filter={period:'month',month:today().slice(0,7),machine:'ALL'};
  var fCard=card({padding:'12px',marginBottom:'14px'});
  var tCard=card({marginBottom:'14px'});
  var cCard=card({padding:'14px'});
  var ctInst=null;
  function renderCT(){
    var fLogs=approvedLogs.filter(function(l){if(!l.date)return false;var dOk=filter.period==='month'?l.date.slice(0,7)===filter.month:true;return dOk&&(filter.machine==='ALL'||(MACHINE_SHORT[l.machine]||l.machine)===filter.machine);});
    fCard.innerHTML='';
    var sf=div({style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}});
    ['month','all'].forEach(function(p){var b=btn(p==='all'?'ALL TIME':'MONTH','',function(){filter.period=p;renderCT();},{padding:'5px 12px',fontSize:'11px',background:filter.period===p?'#047857':'#f1f5f9',color:filter.period===p?'#fff':'#1e293b',border:'none',borderRadius:'6px',fontWeight:'700'});sf.appendChild(b);});
    if(filter.period==='month'){var mi=el('input',{type:'month',value:filter.month,style:{width:'auto'}});mi.oninput=function(e){filter.month=e.target.value;renderCT();};sf.appendChild(mi);}
    var ms=el('select',{style:{width:'auto'}});ms.innerHTML=buildOpts(machines,function(m){return m;},function(m){return m;},function(m){return m===filter.machine;});ms.onchange=function(e){filter.machine=e.target.value;renderCT();};sf.appendChild(ms);
    fCard.appendChild(sf);
    var byProd={};fLogs.forEach(function(l){var p=l.product||'?';if(!byProd[p])byProd[p]={losses:[],entries:0,setting:l.setting||''};byProd[p].losses.push(l.totalLoss||0);byProd[p].entries++;});
    var avg=function(arr){return arr.length?+(arr.reduce(function(a,v){return a+v;},0)/arr.length).toFixed(0):null;};
    var rows=Object.entries(byProd).map(function(kv){return{product:kv[0],avgLoss:avg(kv[1].losses),entries:kv[1].entries,setting:kv[1].setting};});
    tCard.innerHTML='';var hdr=div({style:{padding:'11px 14px',background:'#1e3a5f',borderRadius:'10px 10px 0 0'}});hdr.innerHTML='<span style="font-family:monospace;font-size:11px;color:#bfdbfe;font-weight:800;letter-spacing:2px">PRODUCT SUMMARY</span>';tCard.appendChild(hdr);
    var wrap=div({style:{overflowX:'auto'}});var tbl=el('table',{});tbl.innerHTML='<thead><tr><th>Product</th><th>Setting</th><th>Entries</th><th>Avg Loss/hr</th></tr></thead>';
    var tb=el('tbody',{});if(!rows.length){var r=el('tr',{});r.innerHTML='<td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">No approved data.</td>';tb.appendChild(r);}
    rows.forEach(function(r,i){var tr=el('tr',{style:{background:i%2?'#f9fafb':'#fff'}});tr.innerHTML='<td style="font-weight:700">'+r.product+'</td><td style="font-size:11px;color:#64748b">'+r.setting+'</td><td style="font-family:monospace">'+r.entries+'</td><td style="font-family:monospace;color:#dc2626;font-weight:800">'+(r.avgLoss!==null?r.avgLoss+' m':'--')+'</td>';tb.appendChild(tr);});
    tbl.appendChild(tb);wrap.appendChild(tbl);tCard.appendChild(wrap);
    cCard.innerHTML='<div style="font-family:monospace;font-size:11px;font-weight:800;color:#047857;letter-spacing:2px;margin-bottom:10px">PRODUCT LOSS CHART</div><div style="height:250px"><canvas id="ctChart"></canvas></div>';
    setTimeout(function(){var c=document.getElementById('ctChart');if(!c)return;if(ctInst)ctInst.destroy();var sorted=rows.filter(function(r){return r.avgLoss!==null;}).sort(function(a,b){return b.avgLoss-a.avgLoss;});if(!sorted.length)return;ctInst=new Chart(c,{type:'bar',data:{labels:sorted.map(function(r){return r.product.length>14?r.product.slice(0,14)+'...':r.product;}),datasets:[{label:'Avg Loss per Hour (mins)',data:sorted.map(function(r){return r.avgLoss;}),backgroundColor:'rgba(220,38,38,.7)',borderColor:'#dc2626',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11}}}},scales:{y:{title:{display:true,text:'Minutes'},beginAtZero:true}}}});},60);
  }
  renderCT();d.appendChild(fCard);d.appendChild(tCard);d.appendChild(cCard);return d;
}
