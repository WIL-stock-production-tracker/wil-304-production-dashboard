const GH={
  token:null,repo:null,owner:null,
  async init(owner,repo,token){
    this.owner=owner;this.repo=repo;this.token=token;
    // Persist to localStorage
    try{localStorage.setItem('wil_gh_owner',owner);localStorage.setItem('wil_gh_repo',repo);localStorage.setItem('wil_gh_token',token);}catch(e){}
  },
  loadSaved(){
    try{
      const o=localStorage.getItem('wil_gh_owner');
      const r=localStorage.getItem('wil_gh_repo');
      const t=localStorage.getItem('wil_gh_token');
      if(o&&r&&t){this.owner=o;this.repo=r;this.token=t;return{owner:o,repo:r,token:t};}
    }catch(e){}
    return null;
  },
  clear(){
    try{localStorage.removeItem('wil_gh_owner');localStorage.removeItem('wil_gh_repo');localStorage.removeItem('wil_gh_token');}catch(e){}
    this.owner=null;this.repo=null;this.token=null;
  },
  async readFile(path){
    const r=await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`,{headers:{Authorization:`Bearer ${this.token}`,Accept:"application/vnd.github.v3+json"}});
    if(r.status===404)return{data:null,sha:null};
    const j=await r.json();
    return{data:JSON.parse(atob(j.content.replace(/\n/g,""))),sha:j.sha};
  },
  async writeFile(path,data,sha){
    const body={message:`WIL W304 update: ${path}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),};
    if(sha)body.sha=sha;
    const r=await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`,{method:"PUT",headers:{Authorization:`Bearer ${this.token}`,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});
    return r.ok;
  },
  async load(key){try{const{data}=await this.readFile(`wil_data/${key}.json`);return data||[];}catch{return[];}},
  async save(key,data){try{const{sha}=await this.readFile(`wil_data/${key}.json`);return await this.writeFile(`wil_data/${key}.json`,data,sha);}catch{return false;}}
};

let STATE={supEntries:[],operatorLogs:[],qualityLogs:[],ghConnected:false};

async function syncLoad(){
  if(!STATE.ghConnected)return;
  try{
    STATE.supEntries=await GH.load("supervisor_entries")||[];
    STATE.operatorLogs=await GH.load("operator_logs")||[];
    STATE.qualityLogs=await GH.load("quality_logs")||[];
    render();
  }catch(e){console.warn("Sync load failed",e);}
}
async function syncSave(key){
  if(!STATE.ghConnected)return;
  const map={supervisor_entries:STATE.supEntries,operator_logs:STATE.operatorLogs,quality_logs:STATE.qualityLogs};
  try{await GH.save(key,map[key]);}catch(e){console.warn("Sync save failed",e);}
}

function findEmp(id){return EMP_DETAILS.find(e=>e.id===id);}
function empLogin(id,pw){const e=findEmp(id);return(e&&pw===id)?e:null;}
function today(){return new Date().toISOString().slice(0,10);}
function timeDiff(t1,t2){
  if(!t1||!t2)return null;
  const p=s=>{const[h,m]=s.split(":").map(Number);return h*60+m;};
  let d=p(t2)-p(t1);if(d<0)d+=1440;return d;
}
function mHM(m){if(m===null||m===undefined)return"--";const h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;return`${m<0?"-":""}${h}h ${mn}m`;}
function uid(){return Date.now()+Math.random().toString(36).slice(2,7);}

// Which operators/fitters/setters match a given code
function matchesCode(emp,code){
  if(emp.cat==="Fitter"||emp.cat==="Setter")return true; // fitters & setters see all
  if(code==="A")return true; // code A = all
  return emp.codes.includes(code);
}

// Get operators under a line supervisor (their code intersection)
function getAssignedOperators(supId){
  const sup=findEmp(supId);if(!sup)return[];
  const supCodes=sup.codes;
  return EMP_DETAILS.filter(e=>{
    if(e.cat!=="Operator"&&e.cat!=="Fitter"&&e.cat!=="Setter")return false;
    if(e.cat==="Fitter"||e.cat==="Setter")return true;
    // operator must share at least one code with supervisor
    return e.codes.some(c=>supCodes.includes(c));
  });
}

// ════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const el=buildScreen();
  app.appendChild(el);
  afterRender();
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style")Object.assign(e.style,v);
    else if(k==="className")e.className=v;
    else if(k.startsWith("on"))e[k.toLowerCase()]=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c!==null&&c!==undefined){if(typeof c==="string")e.appendChild(document.createTextNode(c));else e.appendChild(c);}});
  return e;
}
function div(attrs={},children=[]){return el("div",attrs,children);}
function h(tag,attrs={},children=[]){return el(tag,attrs,children);}
function inp(id,lbl,type,val,onChange,opts={}){
  const w=div({});
  w.appendChild(h("label",{className:"lbl",for:id},[lbl]));
  let input;
  if(type==="select"){
    input=el("select",{id,onchange:e=>onChange(e.target.value)});
    (opts.options||[]).forEach(o=>{
      const op=el("option",{value:o.v||o},[o.l||o]);
      if((o.v||o)===val)op.selected=true;
      input.appendChild(op);
    });
  } else if(type==="textarea"){
    input=el("textarea",{id,rows:"2",placeholder:opts.ph||""},[val||""]);
    input.oninput=e=>onChange(e.target.value);
  } else {
    input=el("input",{id,type,value:val||"",placeholder:opts.ph||""});
    if(opts.readonly)input.readOnly=true;
    input.oninput=e=>onChange(e.target.value);
  }
  w.appendChild(input);
  return w;
}
function fld(label,child){
  const w=div({className:"fld"});
  w.appendChild(h("label",{className:"lbl"},[label]));
  w.appendChild(child);
  return w;
}
function btn(label,cls,onClick,style={}){
  const b=el("button",{className:`btn ${cls}`,style,onclick:onClick},[label]);
  return b;
}
function card(children=[],style={}){return div({className:"card",style},{children});}
function kpiCard(label,value,color){
  return div({className:"card kpi"},{})
   // use innerHTML for simplicity in kpi
    ;
}
function pill(label,cls){return el("span",{className:`pill ${cls}`},[label]);}
function sectionHdr(t,c="#1e40af"){
  const d=div({style:{fontFamily:"monospace",fontSize:"11px",fontWeight:"800",letterSpacing:"2px",color:c,textTransform:"uppercase",marginBottom:"12px",paddingBottom:"8px",borderBottom:`2px solid ${c}30`}});
  d.textContent=t;return d;
}

function buildScreen(){
  const s=APP.screen;
  let content;
  if(s==="landing")content=screenLanding();
  else if(s==="ghsetup")content=screenGHSetup();
  else if(s==="roleselect")content=screenRoleSelect();
  else if(s==="sup_login")content=screenLogin("Line Supervisor","#1e40af","supervisor");
  else if(s==="op_login")content=screenLogin("Operator / Fitter / Setter","#047857","operator");
  else if(s==="qual_login")content=screenLogin("Quality Inspector","#7c3aed","quality");
  else if(s==="supervisor")content=screenSupervisor();
  else if(s==="operator")content=screenOperator();
  else if(s==="quality")content=screenQuality();
  else if(s==="dashboards")content=screenDashboards();
  else content=screenLanding();

  const wrap=div({});
  // Notify bar
  if(APP.notify){
    const nb=div({style:{position:"fixed",top:"12px",left:"50%",transform:"translateX(-50%)",background:"#047857",color:"#fff",padding:"10px 24px",borderRadius:"8px",fontWeight:"700",fontSize:"13px",zIndex:"9999",boxShadow:"0 4px 16px rgba(0,0,0,.2)"}});
    nb.textContent=APP.notify;
    wrap.appendChild(nb);
  }
  wrap.appendChild(content);
  return wrap;
}

// ── GitHub Setup ─────────────────────────────────────────
function screenGHSetup(){
  const d=div({style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:"24px"}});
  const box=div({style:{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"14px",padding:"40px",width:"440px",boxShadow:"0 8px 32px rgba(0,0,0,.08)"}});

  box.innerHTML=`<div style="text-align:center;margin-bottom:28px">
    <div style="font-size:32px;margin-bottom:10px">🔗</div>
    <div style="font-family:monospace;font-size:14px;font-weight:800;color:#1e3a5f;letter-spacing:2px">GITHUB STORAGE SETUP</div>
    <div style="color:#64748b;font-size:12px;margin-top:6px">Data saved as JSON files in your GitHub repo</div>
  </div>`;

  const form=div({});
  const fields=[["owner","GitHub Username / Org",APP.ghOwner,v=>APP.ghOwner=v],["repo","Repository Name (e.g. wil-data)",APP.ghRepo,v=>APP.ghRepo=v],["token","Personal Access Token (repo scope)",APP.ghToken,v=>APP.ghToken=v]];
  fields.forEach(([id,lbl,val,cb])=>{
    const fw=div({style:{marginBottom:"14px"}});
    fw.appendChild(h("label",{className:"lbl"},[lbl]));
    const i=el("input",{type:id==="token"?"password":"text",value:val,placeholder:id==="token"?"ghp_xxxxxxxxxxxx":""});
    i.oninput=e=>cb(e.target.value);
    fw.appendChild(i);
    form.appendChild(fw);
  });
  box.appendChild(form);

  if(APP.ghErr){
    const err=div({style:{background:"#fff1f2",border:"1px solid #fca5a5",borderRadius:"7px",padding:"10px",marginBottom:"12px",color:"#dc2626",fontSize:"12px"}});
    err.textContent=APP.ghErr;box.appendChild(err);
  }

  const info=div({style:{background:"#f0f7ff",border:"1.5px solid #bfdbfe",borderRadius:"7px",padding:"12px",marginBottom:"16px",fontSize:"11px",color:"#1e40af",lineHeight:"1.7"}});
  info.innerHTML=`<strong>Setup steps:</strong><br>
1. Create a GitHub repo (e.g. <code>wil-w304-data</code>)<br>
2. Generate a Personal Access Token with <strong>repo</strong> scope<br>
3. Enter details above and click Connect<br>
4. Data auto-saves to <code>wil_data/</code> folder in your repo`;
  box.appendChild(info);

  const connectBtn=btn("🔗 Connect & Test","btn-blue",async()=>{
    APP.ghErr="";
    if(!APP.ghOwner||!APP.ghRepo||!APP.ghToken){APP.ghErr="All fields required.";render();return;}
    await GH.init(APP.ghOwner,APP.ghRepo,APP.ghToken);
    try{
      const test=await fetch(`https://api.github.com/repos/${APP.ghOwner}/${APP.ghRepo}`,{headers:{Authorization:`Bearer ${APP.ghToken}`}});
      if(!test.ok){APP.ghErr="Cannot access repo. Check credentials.";render();return;}
      STATE.ghConnected=true;
      await syncLoad();
      notify("✓ GitHub connected! Data syncing...");
      go("landing");
    }catch(e){APP.ghErr="Connection error: "+e.message;render();}
  },{width:"100%",padding:"13px",fontSize:"14px",marginBottom:"10px"});
  box.appendChild(connectBtn);

  if(STATE.ghConnected){
    const disconnBtn=btn("Disconnect GitHub","btn-gray",()=>{STATE.ghConnected=false;GH.owner=null;go("landing");},{width:"100%",padding:"10px",fontSize:"12px",marginBottom:"10px"});
    box.appendChild(disconnBtn);
  }

  const backBtn=btn("← Back","btn-gray",()=>go("landing"),{width:"100%",padding:"10px",fontSize:"12px",background:"transparent",color:"#64748b",border:"1px solid #e2e8f0"});
  box.appendChild(backBtn);
  d.appendChild(box);return d;
}

// ── Generic Login ────────────────────────────────────────
function screenLogin(roleLabel,color,nextScreen){
  const d=div({style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc"}});
  const box=div({style:{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"14px",padding:"48px 44px",width:"400px",boxShadow:"0 8px 32px rgba(0,0,0,.08)"}});

  let empId="",pw="",err="";

  const render2=()=>{
    box.innerHTML=`
      <div style="text-align:center;margin-bottom:28px">
        <div style="background:${color};color:#fff;font-family:monospace;font-weight:800;font-size:16px;padding:7px 16px;border-radius:6px;letter-spacing:2px;display:inline-block;margin-bottom:10px">${roleLabel.toUpperCase()}</div>
        <div style="color:#374151;font-size:12px;font-weight:600">Employee Login · WIL Plant W304</div>
        <div style="color:#94a3b8;font-size:11px;margin-top:4px">Password = Your Employee ID</div>
      </div>`;
    const f1=div({style:{marginBottom:"14px"}});
    f1.innerHTML=`<label class="lbl">Employee ID</label>`;
    const i1=el("input",{type:"text",value:empId,placeholder:"e.g. 10104020"});
    i1.oninput=e=>{empId=e.target.value;};
    i1.onkeydown=e=>{if(e.key==="Enter")doLogin();};
    f1.appendChild(i1);box.appendChild(f1);

    const f2=div({style:{marginBottom:"14px"}});
    f2.innerHTML=`<label class="lbl">Password</label>`;
    const i2=el("input",{type:"password",value:pw,placeholder:"Your Employee ID"});
    i2.oninput=e=>{pw=e.target.value;};
    i2.onkeydown=e=>{if(e.key==="Enter")doLogin();};
    f2.appendChild(i2);box.appendChild(f2);

    if(err){const eb=div({style:{background:"#fff1f2",border:"1px solid #fca5a5",borderRadius:"7px",padding:"9px 12px",marginBottom:"12px",color:"#dc2626",fontSize:"12px"}});eb.textContent=err;box.appendChild(eb);}

    const loginBtn=btn("SIGN IN →","btn-blue",doLogin,{width:"100%",padding:"13px",fontSize:"14px",marginBottom:"10px",background:color});
    box.appendChild(loginBtn);
    const backBtn=btn("← Back","btn-gray",()=>go("roleselect"),{width:"100%",padding:"9px",fontSize:"12px",background:"transparent",color:"#64748b",border:"1px solid #e2e8f0"});
    box.appendChild(backBtn);
  };

  function doLogin(){
    const emp=empLogin(empId.trim(),pw.trim());
    if(!emp){err="Invalid ID or password. (Password = Employee ID)";render2();return;}
    // Validate role access
    if(nextScreen==="supervisor"&&emp.cat!=="Line Supervisor"&&emp.cat!=="Shift Supervisor"){err="Access denied: Only Line Supervisors can use this screen.";render2();return;}
    if(nextScreen==="operator"&&!["Operator","Fitter","Setter"].includes(emp.cat)){err="Access denied: Operator / Fitter / Setter only.";render2();return;}
    APP.currentEmp=emp;go(nextScreen);
  }

  render2();
  d.appendChild(box);return d;
}

function buildNav(roleLabel,color,empName,tabs,activeTab,onTab){
  const nav=div({className:"nav",style:{"--nc":color}});

  const brand=div({style:{display:"flex",alignItems:"center",gap:"10px",marginRight:"20px",flexShrink:"0"}});
  brand.innerHTML=`<div style="background:${color};color:#fff;font-family:monospace;font-weight:800;font-size:13px;padding:5px 10px;border-radius:5px;letter-spacing:2px">${roleLabel}</div>
    <div style="font-family:monospace;font-size:11px;color:${color};font-weight:700">${empName}</div>`;
  nav.appendChild(brand);

  tabs.forEach(t=>{
    const tb=el("button",{className:`nav-tab${APP.supTab===t.k||APP.dashTab===t.k||activeTab===t.k?" active":""}`,onclick:()=>{onTab(t.k);render();}},[t.l]);
    nav.appendChild(tb);
  });

  const right=div({style:{marginLeft:"auto",display:"flex",gap:"8px",alignItems:"center"}});
  const logoutB=btn("Logout","btn-gray",()=>{APP.currentEmp=null;go("roleselect");},{padding:"6px 14px",fontSize:"11px"});
  right.appendChild(logoutB);
  nav.appendChild(right);
  return nav;
}

function buildSupStartTime(emp){
  const d=div({});
  d.appendChild(sectionHdr("🚀 Machine Start Time Entry"));

  // Supervisor's codes → available products/settings
  const supCodes=emp.codes.filter(c=>c!=="A");
  // code A = all, so if A include everything
  const availCodes=emp.codes.includes("A")?Object.keys(CODE_MAP):supCodes;

  let form={date:today(),machine:"",code:"",product:"",setting:"",jobSno:"",startTime:""};

  const formCard=div({className:"card",style:{padding:"24px",marginBottom:"20px"}});
  const renderForm=()=>{
    formCard.innerHTML="";
    const g=div({className:"grid3"});

    // Date
    const df=fld("Date *",el("input",{type:"date",value:form.date}));
    df.querySelector("input").oninput=e=>form.date=e.target.value;
    g.appendChild(df);

    // Machine
    const mf=fld("Machine *",(function(){var s=el("select");s.innerHTML=buildOpts(MACHINE_LIST,function(m){return m;},function(m){return (MACHINE_SHORT[m]||m)+" - "+m;},function(m){return form.machine===m;},"-- Select Machine --");s.onchange=function(e){form.machine=e.target.value;};return s;}()));
    g.appendChild(mf);

    // Code → drives Product & Setting
    const cf=fld("Deployment Code *",(function(){
      const s=el("select");
      s.innerHTML=buildOpts(availCodes,function(c){return c;},function(c){var cm=CODE_MAP[c];return c+' - '+(cm?cm.setting:'All');},function(c){return form.code===c;},'-- Select Code --');
      s.onchange=function(e){
        form.code=e.target.value;
        if(CODE_MAP[form.code]){form.product=CODE_MAP[form.code].product;form.setting=CODE_MAP[form.code].setting;}
        renderForm();
      };return s;}()));
    g.appendChild(cf);

    // Product (auto-filled, readonly)
    const pf=fld("Product",el("input",{type:"text",value:form.product,readonly:"true"}));
    pf.querySelector("input").readOnly=true;g.appendChild(pf);

    // Setting (auto-filled)
    const sf=fld("Setting Type",el("input",{type:"text",value:form.setting,readonly:"true"}));
    sf.querySelector("input").readOnly=true;g.appendChild(sf);

    // Job S.No
    const jf=fld("Job & Serial No. *",el("input",{type:"text",value:form.jobSno,placeholder:"e.g. BF-001"}));
    jf.querySelector("input").oninput=e=>form.jobSno=e.target.value;g.appendChild(jf);

    // Start Time
    const tf=fld("Start Time *",el("input",{type:"time",value:form.startTime}));
    tf.querySelector("input").oninput=e=>form.startTime=e.target.value;g.appendChild(tf);

    formCard.appendChild(g);

    // Info box
    if(form.setting&&PLANNED_CT[form.setting]){
      const ib=div({className:"info-box",style:{marginTop:"10px"}});
      ib.innerHTML=`<span style="font-family:monospace;font-size:11px;font-weight:700;color:#1e40af">PLANNED CYCLE TIME: </span><span style="font-family:monospace;font-size:16px;font-weight:800;color:#1e3a5f">${PLANNED_CT[form.setting]} hrs</span>`;
      formCard.appendChild(ib);
    }

    // Assigned operators preview
    if(form.code){
      const ops=EMP_DETAILS.filter(e=>["Operator","Fitter","Setter"].includes(e.cat)&&(e.cat==="Fitter"||e.cat==="Setter"||e.codes.includes(form.code)));
      if(ops.length){
        const ob=div({style:{background:"#f0fdf4",border:"1.5px solid #a7f3d0",borderRadius:"8px",padding:"10px 14px",marginTop:"10px",fontSize:"11px",color:"#065f46"}});
        ob.innerHTML=`<strong>Operators assigned to code ${form.code}:</strong> ${ops.map(o=>`${o.name} (${o.cat})`).join(" · ")}`;
        formCard.appendChild(ob);
      }
    }

    const sb=btn("SAVE START TIME →","btn-blue",()=>{
      if(!form.machine||!form.code||!form.jobSno||!form.startTime||!form.date){alert("Fill all required fields.");return;}
      const entry={id:uid(),supervisorId:emp.id,supervisorName:emp.name,date:form.date,machine:form.machine,code:form.code,product:form.product,setting:form.setting,jobSno:form.jobSno,startTime:form.startTime,endTime:"",status:"OPEN",plannedCT:PLANNED_CT[form.setting]||0};
      STATE.supEntries.push(entry);
      syncSave("supervisor_entries");
      form={date:today(),machine:"",code:"",product:"",setting:"",jobSno:"",startTime:""};
      notify("✓ Machine Start Time saved!");
      renderForm();renderTable();
    },{width:"100%",padding:"13px",fontSize:"14px",marginTop:"14px"});
    formCard.appendChild(sb);
  };
  renderForm();
  d.appendChild(formCard);

  // Table of entries
  const tableWrap=div({className:"card"});
  const renderTable=()=>{
    tableWrap.innerHTML="";
    const hdr=div({style:{padding:"11px 16px",background:"#1e3a5f",borderRadius:"10px 10px 0 0"}});
    hdr.innerHTML=`<span style="font-family:monospace;font-size:11px;color:#bfdbfe;font-weight:800;letter-spacing:2px">MY START TIME ENTRIES (${STATE.supEntries.filter(e=>e.supervisorId===emp.id).length})</span>`;
    tableWrap.appendChild(hdr);
    const tbl=el("table",{});
    tbl.innerHTML=`<thead><tr>${["Date","Machine","Code","Product","Setting","Job S.No","Start Time","End Time","Status"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>`;
    const tb=el("tbody",{});
    const entries=[...STATE.supEntries].filter(e=>e.supervisorId===emp.id).reverse();
    if(!entries.length){const r=el("tr",{});r.innerHTML=`<td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">No entries yet.</td>`;tb.appendChild(r);}
    entries.forEach((e,i)=>{
      const r=el("tr",{style:{background:i%2?"#f9fafb":"#fff"}});
      r.innerHTML=`<td style="font-family:monospace">${e.date}</td><td style="font-family:monospace">${MACHINE_SHORT[e.machine]||e.machine}</td><td style="font-family:monospace;font-weight:800;color:#1e40af">${e.code}</td><td>${e.product}</td><td style="font-size:11px;color:#64748b">${e.setting}</td><td style="font-family:monospace">${e.jobSno}</td><td style="font-family:monospace;color:#1e40af;font-weight:800">${e.startTime}</td><td style="font-family:monospace;color:#047857;font-weight:800">${e.endTime||"-"}</td><td><span class="pill ${e.endTime?"pill-green":"pill-orange"}">${e.endTime?"COMPLETED":"OPEN"}</span></td>`;
      tb.appendChild(r);
    });
    tbl.appendChild(tb);
    const wrap=div({style:{overflowX:"auto"}});wrap.appendChild(tbl);tableWrap.appendChild(wrap);
  };
  renderTable();
  d.appendChild(tableWrap);
  return d;
}

function buildSupAuth(emp){
  const d=div({});
  d.appendChild(sectionHdr("🔐 Operator Authorization","#dc2626"));

  // Get operators assigned under this supervisor (code intersection)
  const assignedOpIds=getAssignedOperators(emp.id).map(e=>e.id);
  const myLogs=STATE.operatorLogs.filter(l=>assignedOpIds.includes(l.empId));
  const pending=myLogs.filter(l=>l.approvalStatus==="PENDING");
  const approved=myLogs.filter(l=>l.approvalStatus==="APPROVED");
  const rejected=myLogs.filter(l=>l.approvalStatus==="REJECTED");

  const mkTable=(logs,showActions)=>{
    const wrap=div({style:{overflowX:"auto",maxHeight:showActions?"400px":"280px",overflow:"auto"}});
    const tbl=el("table",{});
    tbl.innerHTML=`<thead><tr>${["Date","Operator","Machine","Code","Shift Slot","Loss Mins",showActions?"Action":"Status"].map(h=>`<th style="position:sticky;top:0">${h}</th>`).join("")}</tr></thead>`;
    const tb=el("tbody",{});
    if(!logs.length){const r=el("tr",{});r.innerHTML=`<td colspan="7" style="text-align:center;color:#94a3b8;padding:20px">${showActions?"No pending approvals 🎉":"No entries yet."}</td>`;tb.appendChild(r);}
    logs.forEach((l,i)=>{
      const totalLoss=Object.values(l.losses||{}).reduce((a,v)=>a+(v||0),0);
      const op=findEmp(l.empId);
      const r=el("tr",{style:{background:i%2?"#f9fafb":"#fff"}});
      let actionCell=showActions
        ?`<td><div style="display:flex;gap:8px">${["Approve","Reject"].map((lbl,ai)=>`<button class="btn ${ai===0?"btn-green":"btn-red"}" style="padding:5px 12px;font-size:11px" onclick="supAction('${l.id}','${ai===0?"APPROVED":"REJECTED"}')">${lbl}</button>`).join("")}</div></td>`
        :`<td><span class="pill ${l.approvalStatus==="APPROVED"?"pill-green":"pill-red"}">${l.approvalStatus}</span></td>`;
      r.innerHTML=`<td style="font-family:monospace">${l.date}</td><td>${op?op.name:l.empId}</td><td style="font-family:monospace">${MACHINE_SHORT[l.machine]||l.machine}</td><td style="font-family:monospace;font-weight:800;color:#1e40af">${l.code||""}</td><td style="font-family:monospace">${l.shiftSlot||""}</td><td style="font-family:monospace;color:#dc2626;font-weight:800">${totalLoss}m</td>${actionCell}`;
      tb.appendChild(r);
    });
    tbl.appendChild(tb);wrap.appendChild(tbl);return wrap;
  };

  // Pending
  const pendCard=div({className:"card",style:{marginBottom:"20px"}});
  const pendHdr=div({style:{padding:"11px 16px",background:"#7f1d1d",borderRadius:"10px 10px 0 0"}});
  pendHdr.innerHTML=`<span style="font-family:monospace;font-size:11px;color:#fecaca;font-weight:800;letter-spacing:2px">PENDING APPROVAL (${pending.length})</span>`;
  pendCard.appendChild(pendHdr);pendCard.appendChild(mkTable(pending,true));
  d.appendChild(pendCard);

  // Approved
  const appCard=div({className:"card"});
  const appHdr=div({style:{padding:"11px 16px",background:"#1e3a5f",borderRadius:"10px 10px 0 0"}});
  appHdr.innerHTML=`<span style="font-family:monospace;font-size:11px;color:#bfdbfe;font-weight:800;letter-spacing:2px">APPROVED (${approved.length})</span>`;
  appCard.appendChild(appHdr);appCard.appendChild(mkTable([...approved].reverse(),false));
  d.appendChild(appCard);
  return d;

function buildOEEDash(){
  const d=div({});
  d.appendChild(sectionHdr("📊 OEE Dashboard","#ea580c"));

  const approvedLogs=STATE.operatorLogs.filter(l=>l.approvalStatus==="APPROVED");
  const machines=["ALL",...new Set(approvedLogs.map(l=>MACHINE_SHORT[l.machine]||l.machine).filter(Boolean))];
  let filter={period:"month",month:today().slice(0,7),year:today().slice(0,4),machine:"ALL"};
  const SCHED_MINS=1440;
  const BD_CATS=["MACHINE BREAK DOWN","PREVENTIVE MAINTENANCE/MACHINE CLEANING"];
  const NM_CATS=["NO MATERIAL"];

  function calcOEE(logs){
    if(!logs.length)return{oee:0,avail:0,perf:0,qual:0,good:0,rejected:0};
    const machineDays=new Set(logs.map(l=>`${l.date}__${l.machine}`)).size;
    const totalSched=machineDays*SCHED_MINS;
    const bdLoss=logs.reduce((a,l)=>{let s=0;BD_CATS.forEach(c=>s+=(l.losses?.[c]||0));return a+s;},0);
    const avail=totalSched>0?Math.min(100,Math.max(0,(totalSched-bdLoss)/totalSched*100)):0;
    const totalActCT=logs.reduce((a,l)=>a+(l.actCT||0),0);
    const exclLoss=logs.reduce((a,l)=>{let s=0;[...BD_CATS,...NM_CATS].forEach(c=>s+=(l.losses?.[c]||0));return a+s;},0);
    const actRun=Math.max(1,totalActCT-exclLoss);
    const plannedTotal=logs.length*60;
    const perf=Math.min(100,Math.max(0,plannedTotal/actRun*100));
    const relQ=STATE.qualityLogs.filter(q=>{
      const dOk=filter.period==="month"?q.date?.slice(0,7)===filter.month:q.date?.slice(0,4)===filter.year;
      const mOk=filter.machine==="ALL"||new Set(logs.map(l=>l.machine)).has(q.machine);
      return dOk&&mOk;
    });
    const good=relQ.reduce((a,q)=>a+(q.goodQty||0),0);
    const total=relQ.reduce((a,q)=>a+(q.inspectedQty||0),0);
    const qual=total>0?Math.min(100,good/total*100):95;
    const oee=(avail/100)*(perf/100)*(qual/100)*100;
    return{oee:+oee.toFixed(1),avail:+avail.toFixed(1),perf:+perf.toFixed(1),qual:+qual.toFixed(1),good,rejected:total-good};
  }

  const kpiCard2=div({style:{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"20px"}});
  const filterCard=div({className:"card",style:{padding:"14px 16px",marginBottom:"20px"}});
  const machOEECard=div({className:"card",style:{padding:"16px",marginBottom:"20px"}});
  const trendCard=div({className:"card",style:{padding:"16px"}});
  let barInst=null,lineInst=null;

  const renderOEE=()=>{
    const fLogs=approvedLogs.filter(l=>{
      if(!l.date)return false;
      const dOk=filter.period==="month"?l.date.slice(0,7)===filter.month:l.date.slice(0,4)===filter.year;
      const mOk=filter.machine==="ALL"||(MACHINE_SHORT[l.machine]||l.machine)===filter.machine;
      return dOk&&mOk;
    });

    const overall=calcOEE(fLogs);
    const kpiColor=(v,g=85,w=70)=>v>=g?"#047857":v>=w?"#d97706":"#dc2626";

    filterCard.innerHTML=`<div style="font-family:monospace;font-size:10px;font-weight:800;color:#64748b;letter-spacing:2px;margin-bottom:10px">FILTERS</div>`;
    const sf=div({style:{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}});
    ["month","year"].forEach(p=>{const b=btn(p.toUpperCase(),"",()=>{filter.period=p;renderOEE();},{padding:"6px 14px",fontSize:"11px",background:filter.period===p?"#ea580c":"#f1f5f9",color:filter.period===p?"#fff":"#1e293b",border:"none",borderRadius:"6px",fontWeight:"700"});sf.appendChild(b);});
    if(filter.period==="month"){const i=el("input",{type:"month",value:filter.month,style:{width:"auto"}});i.oninput=e=>{filter.month=e.target.value;renderOEE();};sf.appendChild(i);}
    if(filter.period==="year"){const s=el("select",{style:{width:"auto"}});s.innerHTML=buildOpts(["2024","2025","2026","2027"],function(y){return y;},function(y){return y;},function(y){return y===filter.year;});s.onchange=e=>{filter.year=e.target.value;renderOEE();};sf.appendChild(s);}
    const ms=el("select",{style:{width:"auto"}});ms.innerHTML=buildOpts(machines,function(m){return m;},function(m){return m;},function(m){return m===filter.machine;});ms.onchange=function(e){filter.machine=e.target.value;renderOEE();};sf.appendChild(ms);
    filterCard.appendChild(sf);

    // formula box
    const fb=div({style:{background:"#f0f7ff",border:"1.5px solid #bfdbfe",borderRadius:"7px",padding:"10px 14px",marginTop:"10px",fontSize:"11px",color:"#1e40af",lineHeight:"1.8"}});
    fb.innerHTML=`<strong>OEE = Availability × Performance × Quality</strong><br>Availability = (1440 − Breakdown − PM) / 1440 per machine-day | Performance = Planned CT / Actual Running Time | Quality = Good / Total`;
    filterCard.appendChild(fb);

    kpiCard2.innerHTML="";
    [{l:"🎯 OEE",v:overall.oee+"%",c:kpiColor(overall.oee)},{l:"⏱ AVAILABILITY",v:overall.avail+"%",c:kpiColor(overall.avail)},{l:"⚡ PERFORMANCE",v:overall.perf+"%",c:kpiColor(overall.perf)},{l:"✅ QUALITY",v:overall.qual+"%",c:kpiColor(overall.qual,98,95)},{l:"✔ GOOD PARTS",v:overall.good,c:"#1e40af"},{l:"✘ REJECTED",v:overall.rejected,c:"#dc2626"}].forEach(k=>{
      const kc=div({className:"card",style:{padding:"14px 18px",flex:"1",minWidth:"100px",textAlign:"center"}});
      kc.innerHTML=`<div class="kpi-lbl">${k.l}</div><div class="kpi-val" style="color:${k.c};font-size:22px">${k.v}</div>`;
      kpiCard2.appendChild(kc);
    });

    // Machine OEE
    const machData=machines.filter(m=>m!=="ALL").map(m=>{
      const ml=fLogs.filter(l=>(MACHINE_SHORT[l.machine]||l.machine)===m);
      return{machine:m,...calcOEE(ml),entries:ml.length};
    }).filter(m=>m.entries>0);

    machOEECard.innerHTML=`<div style="font-family:monospace;font-size:11px;font-weight:800;color:#ea580c;letter-spacing:2px;margin-bottom:12px">MACHINE-WISE OEE</div>`;
    if(machData.length){
      const tbl=el("table",{});
      tbl.innerHTML=`<thead><tr>${["Machine","OEE%","Avail%","Perf%","Quality%","Entries"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>`;
      const tb=el("tbody",{});
      machData.forEach((m,i)=>{const r=el("tr",{style:{background:i%2?"#f9fafb":"#fff"}});r.innerHTML=`<td style="font-family:monospace;font-weight:800">${m.machine}</td><td style="font-family:monospace;color:${kpiColor(m.oee)};font-weight:800">${m.oee}%</td><td style="font-family:monospace;color:${kpiColor(m.avail)}">${m.avail}%</td><td style="font-family:monospace;color:${kpiColor(m.perf)}">${m.perf}%</td><td style="font-family:monospace;color:${kpiColor(m.qual,98,95)}">${m.qual}%</td><td style="font-family:monospace">${m.entries}</td>`;tb.appendChild(r);});
      tbl.appendChild(tb);machOEECard.appendChild(tbl);
      // bar chart
      machOEECard.appendChild(el("div",{style:{height:"240px",marginTop:"16px"}},[el("canvas",{id:"oeeBar"})]));
      setTimeout(()=>{const c=document.getElementById("oeeBar");if(!c)return;if(barInst)barInst.destroy();barInst=new Chart(c,{type:"bar",data:{labels:machData.map(m=>m.machine),datasets:[{label:"OEE%",data:machData.map(m=>m.oee),backgroundColor:"rgba(234,88,12,.75)"},{label:"Avail%",data:machData.map(m=>m.avail),backgroundColor:"rgba(30,64,175,.7)"},{label:"Perf%",data:machData.map(m=>m.perf),backgroundColor:"rgba(4,120,87,.7)"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top",labels:{font:{size:11}}}},scales:{y:{min:0,max:100}}}});},50);
    } else {machOEECard.innerHTML+=`<div style="color:#94a3b8;text-align:center;padding:24px;font-size:12px">No data for selected period.</div>`;}

    // Day-wise trend
    const dayWise=Array.from({length:31},(_,i)=>{const day=i+1;const dl=fLogs.filter(l=>l.date&&parseInt(l.date.slice(8,10))===day);return{day,...calcOEE(dl)};});
    const withData=dayWise.filter(d=>d.oee>0||d.avail>0);
    trendCard.innerHTML=`<div style="font-family:monospace;font-size:11px;font-weight:800;color:#ea580c;letter-spacing:2px;margin-bottom:12px">DAY-WISE OEE TREND (1–31)</div><div style="height:280px"><canvas id="oeeLineChart"></canvas></div>`;
    setTimeout(()=>{const c=document.getElementById("oeeLineChart");if(!c)return;if(lineInst)lineInst.destroy();if(!withData.length){c.parentElement.innerHTML+='<div style="color:#94a3b8;text-align:center;margin-top:20px;font-size:12px">No approved data. Supervisor must approve operator logs.</div>';return;}lineInst=new Chart(c,{type:"line",data:{labels:withData.map(d=>"D"+d.day),datasets:[{label:"OEE%",data:withData.map(d=>d.oee),borderColor:"#ea580c",tension:.3,fill:false,pointRadius:3},{label:"Availability%",data:withData.map(d=>d.avail),borderColor:"#1e40af",tension:.3,fill:false,pointRadius:3},{label:"Performance%",data:withData.map(d=>d.perf),borderColor:"#047857",tension:.3,fill:false,pointRadius:3},{label:"Quality%",data:withData.map(d=>d.qual),borderColor:"#7c3aed",tension:.3,fill:false,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top",labels:{font:{size:11}}}},scales:{y:{min:0,max:100}}}});},80);
  };

  renderOEE();
  d.appendChild(filterCard);d.appendChild(kpiCard2);d.appendChild(machOEECard);d.appendChild(trendCard);
  return d;
}

function buildCTDash(){
  const d=div({});
  d.appendChild(sectionHdr("⏱ Cycle Time Dashboard","#047857"));
  const approvedLogs=STATE.operatorLogs.filter(l=>l.approvalStatus==="APPROVED");
  const machines=["ALL",...new Set(approvedLogs.map(l=>MACHINE_SHORT[l.machine]||l.machine).filter(Boolean))];
  let filter={period:"month",month:today().slice(0,7),machine:"ALL"};

  const filterCard=div({className:"card",style:{padding:"14px 16px",marginBottom:"20px"}});
  const tableCard=div({className:"card",style:{marginBottom:"20px"}});
  const chartCard=div({className:"card",style:{padding:"16px"}});
  let ctInst=null;

  const renderCT=()=>{
    const fLogs=approvedLogs.filter(l=>{
      if(!l.date)return false;
      const dOk=filter.period==="month"?l.date.slice(0,7)===filter.month:true;
      const mOk=filter.machine==="ALL"||(MACHINE_SHORT[l.machine]||l.machine)===filter.machine;
      return dOk&&mOk;
    });

    filterCard.innerHTML=`<div style="font-family:monospace;font-size:10px;font-weight:800;color:#64748b;letter-spacing:2px;margin-bottom:10px">FILTERS</div>`;
    const sf=div({style:{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}});
    ["month","all"].forEach(p=>{const b=btn(p==="all"?"ALL TIME":"MONTH","",()=>{filter.period=p;renderCT();},{padding:"6px 14px",fontSize:"11px",background:filter.period===p?"#047857":"#f1f5f9",color:filter.period===p?"#fff":"#1e293b",border:"none",borderRadius:"6px",fontWeight:"700"});sf.appendChild(b);});
    if(filter.period==="month"){const i=el("input",{type:"month",value:filter.month,style:{width:"auto"}});i.oninput=e=>{filter.month=e.target.value;renderCT();};sf.appendChild(i);}
    const ms=el("select",{style:{width:"auto"}});ms.innerHTML=buildOpts(machines,function(m){return m;},function(m){return m;},function(m){return m===filter.machine;});ms.onchange=function(e){filter.machine=e.target.value;renderCT();};sf.appendChild(ms);
    filterCard.appendChild(sf);

    // Group by product
    const byProduct={};
    fLogs.forEach(l=>{const p=l.product||"?";if(!byProduct[p])byProduct[p]={actual:[],gap:[],entries:0,setting:l.setting||""};if(l.actCT!==null&&l.actCT!==undefined)byProduct[p].actual.push(l.actCT);if(l.gapTime!==null&&l.gapTime!==undefined)byProduct[p].gap.push(l.gapTime);byProduct[p].entries++;});
    const avg=arr=>arr.length?+(arr.reduce((a,v)=>a+v,0)/arr.length).toFixed(0):null;
    const rows=Object.entries(byProduct).map(([p,d])=>({product:p,avgActual:avg(d.actual),avgGap:avg(d.gap),entries:d.entries,setting:d.setting}));

    // Table
    tableCard.innerHTML="";
    const hdr=div({style:{padding:"11px 16px",background:"#1e3a5f",borderRadius:"10px 10px 0 0"}});
    hdr.innerHTML=`<span style="font-family:monospace;font-size:11px;color:#bfdbfe;font-weight:800;letter-spacing:2px">PRODUCT CYCLE TIME (Avg per 1-hr slot)</span>`;
    tableCard.appendChild(hdr);
    const wrap=div({style:{overflowX:"auto"}});
    const tbl=el("table",{});
    tbl.innerHTML=`<thead><tr>${["Product","Setting","Entries","Avg Actual CT","Avg Gap","Status"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>`;
    const tb=el("tbody",{});
    if(!rows.length){const r=el("tr",{});r.innerHTML=`<td colspan="6" style="text-align:center;color:#94a3b8;padding:24px">No approved data.</td>`;tb.appendChild(r);}
    rows.forEach((r,i)=>{const ok=r.avgGap!==null&&r.avgGap<=0;const tr=el("tr",{style:{background:i%2?"#f9fafb":"#fff"}});tr.innerHTML=`<td style="font-weight:700">${r.product}</td><td style="font-size:11px;color:#64748b">${r.setting}</td><td style="font-family:monospace">${r.entries}</td><td style="font-family:monospace;color:#047857">${r.avgActual!==null?mHM(r.avgActual):"--"}</td><td style="font-family:monospace;color:${r.avgGap>0?"#dc2626":"#047857"};font-weight:800">${r.avgGap!==null?mHM(r.avgGap):"--"}</td><td><span class="pill ${ok?"pill-green":"pill-red"}">${ok?"ON TIME":"DELAYED"}</span></td>`;tb.appendChild(tr);});
    tbl.appendChild(tb);wrap.appendChild(tbl);tableCard.appendChild(wrap);

    // Chart
    chartCard.innerHTML=`<div style="font-family:monospace;font-size:11px;font-weight:800;color:#047857;letter-spacing:2px;margin-bottom:12px">CYCLE TIME CHART</div><div style="height:280px"><canvas id="ctChart"></canvas></div>`;
    setTimeout(()=>{const c=document.getElementById("ctChart");if(!c)return;if(ctInst)ctInst.destroy();const sorted=rows.filter(r=>r.avgActual).sort((a,b)=>b.avgActual-a.avgActual);if(!sorted.length)return;ctInst=new Chart(c,{type:"bar",data:{labels:sorted.map(r=>r.product.length>14?r.product.slice(0,14)+"…":r.product),datasets:[{label:"Avg Actual CT (mins)",data:sorted.map(r=>r.avgActual),backgroundColor:"rgba(4,120,87,.7)",borderColor:"#047857",borderWidth:1},{type:"line",label:"Avg Gap (mins)",data:sorted.map(r=>r.avgGap),borderColor:"#dc2626",fill:false,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top",labels:{font:{size:11}}}},scales:{y:{title:{display:true,text:"Minutes"},beginAtZero:true}}}});},50);
  };

  renderCT();
  d.appendChild(filterCard);d.appendChild(tableCard);d.appendChild(chartCard);
  return d;
}

function afterRender(){}

window.addEventListener("DOMContentLoaded",async()=>{
  // Auto-restore GitHub connection from localStorage
  const saved=GH.loadSaved();
  if(saved){
    APP.ghOwner=saved.owner;APP.ghRepo=saved.repo;APP.ghToken=saved.token;
    try{
      const test=await fetch('https://api.github.com/repos/'+saved.owner+'/'+saved.repo,{headers:{Authorization:'Bearer '+saved.token}});
      if(test.ok){
        STATE.ghConnected=true;
        await syncLoad();
      } else {
        GH.clear();STATE.ghConnected=false;
      }
    }catch(e){
      // Offline - still show connected with local data
      STATE.ghConnected=true;
    }
  }
  render();
});
</script>
